<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./output.css">
    <title>Sistema de Números Primos</title>
</head>
<body>
    <div>
        <div>
            <div>
                <h1>
                    Sistema de Detección<br>de Primos
                </h1>
                <p>
                    Análisis algorítmico en tiempo real de un array numérico
                </p>
                <div>
                    <div>
                        <span>Motor</span> JavaScript optimizado
                    </div>
                    <div>
                        <span>Método</span>
                    </div>
                    <div>
                        <span>Estado</span>
                    </div>
                </div>
            </div>
            <div>
                <div>
                    <h2>Entrada de datos</h2>
                    <span>separados por coma</span>
                </div>
                <input type="text" id="arrayIput">
                <button oncanplay="run()">EJECUTAR ANÁLISIS</button>
                <div>
                    <div>
                        <p>Primo detectado</p>
                        <p id="result">---</p>
                    </div>
                    <div>
                        <p>Estado del sistema</p>
                        <p id="status">Inactivo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
